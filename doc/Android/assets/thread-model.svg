<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <defs>
    <style>
      .box { fill:#f7f7f2; stroke:#2b2b2b; stroke-width:2; }
      .head { fill:#e2f1ff; stroke:#2b2b2b; stroke-width:2; }
      .txt { font: 16px 'Arial', sans-serif; fill:#1a1a1a; }
      .small { font: 14px 'Arial', sans-serif; fill:#1a1a1a; }
      .arrow { stroke:#2b2b2b; stroke-width:2; marker-end:url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#2b2b2b" />
    </marker>
  </defs>

  <rect x="40" y="40" width="280" height="140" class="head"/>
  <text x="60" y="75" class="txt">主线程 (UI)</text>
  <text x="60" y="105" class="small">- 渲染 / 事件分发</text>
  <text x="60" y="130" class="small">- 只能在此更新 UI</text>
  <text x="60" y="155" class="small">- 阻塞易 ANR</text>

  <rect x="40" y="220" width="280" height="160" class="box"/>
  <text x="60" y="255" class="txt">消息队列 (MessageQueue)</text>
  <text x="60" y="285" class="small">- Handler/Looper</text>
  <text x="60" y="310" class="small">- 任务/消息按序执行</text>

  <rect x="400" y="40" width="220" height="140" class="head"/>
  <text x="420" y="75" class="txt">后台线程</text>
  <text x="420" y="105" class="small">- IO / 计算</text>
  <text x="420" y="130" class="small">- 不直接触碰 UI</text>

  <rect x="660" y="40" width="200" height="340" class="box"/>
  <text x="680" y="75" class="txt">线程池</text>
  <text x="680" y="105" class="small">- 复用线程</text>
  <text x="680" y="130" class="small">- 控制并发数</text>
  <text x="680" y="155" class="small">- 限流/排队</text>
  <text x="680" y="205" class="small">任务 A</text>
  <text x="680" y="230" class="small">任务 B</text>
  <text x="680" y="255" class="small">任务 C</text>

  <line x1="320" y1="110" x2="400" y2="110" class="arrow"/>
  <line x1="260" y1="220" x2="260" y2="180" class="arrow"/>
  <line x1="620" y1="110" x2="660" y2="110" class="arrow"/>
</svg>
